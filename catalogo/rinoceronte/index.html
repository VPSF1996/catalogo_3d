<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title id="page-title">Configurador</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cor-primaria: #7c3aed;
    --fundo: #0f1115;
    --superficie: #1a1d24;
    --borda: #2a2d36;
    --texto: #e8eaf0;
    --texto-fraco: #8b8fa8;
    --swatch-size: 36px;
    --raio: 10px;
  }

  html, body {
    height: 100%;
    background: var(--fundo);
    color: var(--texto);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 15px;
    overscroll-behavior: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  #viewer-wrap {
    position: relative;
    flex: 0 0 52vh;
    min-height: 220px;
    background: var(--fundo);
  }
  #canvas3d {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  #btn-reset {
    position: absolute;
    bottom: 12px;
    right: 12px;
    z-index: 9;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--borda);
    background: rgba(26,29,36,.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: var(--texto-fraco);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color .15s, border-color .15s, transform .1s;
  }
  #btn-reset:hover  { color: var(--texto); border-color: var(--cor-primaria); }
  #btn-reset:active { transform: scale(.9); }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--fundo);
    z-index: 10;
    transition: opacity .3s;
  }
  #overlay.oculto { opacity: 0; pointer-events: none; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--borda);
    border-top-color: var(--cor-primaria);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #overlay-msg { color: var(--texto-fraco); font-size: 14px; text-align: center; padding: 0 16px; }
  #overlay-msg.erro { color: #f87171; }

  #painel {
    flex: 1 1 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px 120px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  #cabecalho h1 { font-size: 20px; font-weight: 700; }
  #cabecalho p  { font-size: 13px; color: var(--texto-fraco); margin-top: 4px; }

  .secao { display: flex; flex-direction: column; gap: 8px; }
  .secao-titulo {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--texto-fraco);
  }

  #chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--borda);
    background: var(--superficie);
    color: var(--texto);
    font-size: 14px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    user-select: none;
    -webkit-user-select: none;
  }
  .chip.ativo {
    border-color: var(--cor-primaria);
    background: color-mix(in srgb, var(--cor-primaria) 15%, var(--superficie));
    color: #fff;
    font-weight: 600;
  }

  #swatches-wrap { display: flex; flex-direction: column; gap: 10px; }
  #swatches { display: flex; flex-wrap: wrap; gap: 8px; }
  .swatch {
    width: var(--swatch-size);
    height: var(--swatch-size);
    border-radius: 50%;
    border: 2.5px solid transparent;
    cursor: pointer;
    transition: transform .12s, border-color .12s;
    flex-shrink: 0;
    position: relative;
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch.ativo {
    border-color: var(--cor-primaria);
    transform: scale(1.15);
    box-shadow: 0 0 0 2px var(--fundo), 0 0 0 4px var(--cor-primaria);
  }
  .swatch-label {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    white-space: nowrap;
    color: var(--texto-fraco);
    pointer-events: none;
    opacity: 0;
    transition: opacity .1s;
  }
  .swatch:hover .swatch-label { opacity: 1; }

  #cor-livre-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--texto-fraco);
  }
  #cor-livre {
    width: 36px; height: 36px;
    border: none;
    border-radius: 50%;
    padding: 2px;
    cursor: pointer;
    background: none;
  }
  #cor-livre::-webkit-color-swatch-wrapper { padding: 0; border-radius: 50%; }
  #cor-livre::-webkit-color-swatch { border-radius: 50%; border: none; }

  #resumo { display: flex; flex-direction: column; gap: 6px; }
  .resumo-linha {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  .resumo-cor-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,.15);
  }
  .resumo-rotulo { color: var(--texto-fraco); flex: 0 0 80px; }
  .resumo-valor   { color: var(--texto); font-weight: 500; }

  #btn-wrap {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 16px max(12px, env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--fundo) 70%, transparent);
    z-index: 20;
  }
  #btn-whatsapp {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 14px;
    background: var(--cor-primaria);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: filter .15s, transform .1s;
    letter-spacing: .02em;
  }
  #btn-whatsapp:active { transform: scale(.97); filter: brightness(.9); }
  #btn-whatsapp svg { flex-shrink: 0; }

  #aviso {
    display: none;
    position: fixed;
    bottom: 90px; left: 16px; right: 16px;
    background: #7f1d1d;
    color: #fecaca;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 30;
    text-align: center;
  }

  #quantidade-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .btn-qtd {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--borda);
    background: var(--superficie);
    color: var(--texto);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .15s;
    user-select: none; -webkit-user-select: none;
  }
  .btn-qtd:hover  { border-color: var(--cor-primaria); }
  .btn-qtd:active { transform: scale(.92); }
  #qtd-valor {
    font-size: 22px;
    font-weight: 700;
    min-width: 28px;
    text-align: center;
  }

  @media (min-width: 640px) {
    #app { flex-direction: row; height: 100vh; }
    #viewer-wrap { flex: 1 1 0; height: 100%; }
    #painel { flex: 0 0 340px; height: 100%; border-left: 1px solid var(--borda); }
    #btn-wrap { position: sticky; bottom: 0; }
  }
</style>
</head>

<script type="module">
import * as THREE from 'three';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const root = document.documentElement;
root.style.setProperty('--cor-primaria', CONFIG.marca.corPrimaria);
root.style.setProperty('--fundo', CONFIG.marca.fundo);

// Tema claro automático quando o fundo for uma cor clara
function luminancia(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return 0.299*r + 0.587*g + 0.114*b;
}
if (luminancia(CONFIG.marca.fundo) > 128) {
  root.style.setProperty('--superficie',  '#f0f0f4');
  root.style.setProperty('--borda',       '#dde1ec');
  root.style.setProperty('--texto',       '#1a1a2e');
  root.style.setProperty('--texto-fraco', '#6b7280');
  const br = document.getElementById('btn-reset');
  if (br) br.style.background = 'rgba(255,255,255,.9)';
}

document.getElementById('page-title').textContent = CONFIG.produto.nome + ' — Configurador';
document.getElementById('nome-produto').textContent = CONFIG.produto.nome;
document.getElementById('desc-produto').textContent = CONFIG.produto.descricao;

// ── Estado ────────────────────────────────────────────────────────────────────
const CHAVE_STORAGE = 'config_' + CONFIG.produto.nome.toLowerCase().replace(/\s+/g, '_');
const cores = {};
// meshes: { id: [mesh, mesh, ...] }  — suporta múltiplos STLs por peça
const meshes = {};

CONFIG.pecas.forEach(p => {
  cores[p.id] = p.corPadrao;
  meshes[p.id] = [];
});

try {
  const salvo = JSON.parse(localStorage.getItem(CHAVE_STORAGE) || '{}');
  Object.keys(salvo).forEach(id => {
    if (cores[id] !== undefined) cores[id] = salvo[id];
  });
} catch (_) {}

let pecaSelecionada = CONFIG.pecas[0]?.id ?? null;
let quantidade = 1;

document.getElementById('btn-menos').addEventListener('click', () => {
  if (quantidade > 1) { quantidade--; document.getElementById('qtd-valor').textContent = quantidade; }
});
document.getElementById('btn-mais').addEventListener('click', () => {
  quantidade++;
  document.getElementById('qtd-valor').textContent = quantidade;
});

// ── Three.js ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas3d');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(CONFIG.marca.fundo);

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
camera.position.set(0, 0, 5);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.5;
controls.maxDistance = 50;

const ambLight = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambLight);
const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight1.position.set(2, 4, 3);
scene.add(dirLight1);
const dirLight2 = new THREE.DirectionalLight(0x8899ff, 0.4);
dirLight2.position.set(-3, -1, -2);
scene.add(dirLight2);

function ajustarTamanho() {
  const wrap = document.getElementById('viewer-wrap');
  renderer.setSize(wrap.clientWidth, wrap.clientHeight, false);
  camera.aspect = wrap.clientWidth / wrap.clientHeight;
  camera.updateProjectionMatrix();
}
new ResizeObserver(ajustarTamanho).observe(document.getElementById('viewer-wrap'));
ajustarTamanho();

let autoRotando = CONFIG.modelo.autoRotacao;
controls.addEventListener('start', () => { autoRotando = false; });

// Estado inicial da câmera — preenchido após enquadrarCamera()
let camPosInicial = null;
let camTargetInicial = new THREE.Vector3();

document.getElementById('btn-reset').addEventListener('click', () => {
  if (!camPosInicial) return;
  camera.position.copy(camPosInicial);
  controls.target.copy(camTargetInicial);
  controls.update();
  autoRotando = CONFIG.modelo.autoRotacao;
  grupoCena.rotation.set(rx, ry, rz); // restaura rotação inicial
});

// ── Overlay ───────────────────────────────────────────────────────────────────
const overlay    = document.getElementById('overlay');
const overlayMsg = document.getElementById('overlay-msg');

function ocultarOverlay() { overlay.classList.add('oculto'); }
function mostrarErro(msg) {
  overlayMsg.textContent = msg;
  overlayMsg.classList.add('erro');
  document.querySelector('.spinner').style.display = 'none';
}

// ── Carregar STLs ─────────────────────────────────────────────────────────────
const loader = new STLLoader();
const grupoCena = new THREE.Group();

// Aplicar rotação inicial para deixar o modelo de pé
const rx = THREE.MathUtils.degToRad(CONFIG.modelo.rotacaoX ?? 0);
const ry = THREE.MathUtils.degToRad(CONFIG.modelo.rotacaoY ?? 0);
const rz = THREE.MathUtils.degToRad(CONFIG.modelo.rotacaoZ ?? 0);
grupoCena.rotation.set(rx, ry, rz);
scene.add(grupoCena);

// Normaliza peca.stl / peca.stls para sempre um array
function urlsDaPeca(peca) {
  if (peca.stls) return peca.stls;
  return [peca.stl];
}

function carregarUrl(url, pecaId, rotulo, indice, total) {
  return new Promise((resolve, reject) => {
    loader.load(
      url,
      (geometry) => {
        geometry.computeVertexNormals();
        const material = new THREE.MeshStandardMaterial({
          color: new THREE.Color(cores[pecaId]),
          roughness: 0.55,
          metalness: 0.05,
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.userData.pecaId = pecaId;
        meshes[pecaId].push(mesh);
        grupoCena.add(mesh);
        resolve();
      },
      (evt) => {
        if (evt.total) {
          const pct = Math.round(evt.loaded / evt.total * 100);
          const sufixo = total > 1 ? ` (${indice + 1}/${total})` : '';
          overlayMsg.textContent = `Carregando ${rotulo}${sufixo}… ${pct}%`;
        }
      },
      (err) => reject(new Error(`Falha ao carregar ${url}: ${err.message}`))
    );
  });
}

function carregarPeca(peca) {
  const urls = urlsDaPeca(peca);
  return Promise.all(
    urls.map((url, i) => carregarUrl(url, peca.id, peca.rotulo, i, urls.length))
  );
}

async function carregarTodos() {
  try {
    // Carrega peças em sequência para o progresso ser legível
    for (const peca of CONFIG.pecas) {
      await carregarPeca(peca);
    }
    enquadrarCamera();
    atualizarDestaque();
    ocultarOverlay();
    renderizar();
  } catch (err) {
    mostrarErro('Erro ao carregar modelos.\n' + err.message);
    console.error(err);
  }
}

function enquadrarCamera() {
  // Garantir position zerada antes de medir (evita acúmulo em re-chamadas)
  grupoCena.position.set(0, 0, 0);

  const box = new THREE.Box3().setFromObject(grupoCena);
  const centro = box.getCenter(new THREE.Vector3());
  const tamanho = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(tamanho.x, tamanho.y, tamanho.z);
  const fovRad = THREE.MathUtils.degToRad(camera.fov);
  const dist = (maxDim / 2) / Math.tan(fovRad / 2) * (CONFIG.modelo.zoom ?? 1.5);

  // Mover o grupo para que o centro do bounding box fique na origem
  grupoCena.position.copy(centro.negate());

  camera.position.set(0, 0, dist);
  camera.near = dist * 0.01;
  camera.far  = dist * 10;
  camera.updateProjectionMatrix();
  controls.minDistance = dist * 0.1;
  controls.maxDistance = dist * 5;
  controls.target.set(0, 0, 0);
  controls.update();

  camPosInicial    = camera.position.clone();
  camTargetInicial = controls.target.clone();
}

// ── Raycaster ─────────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const pontoMouse = new THREE.Vector2();

function todosMeshes() {
  return Object.values(meshes).flat();
}

function pegarPecaNoCanvas(event) {
  const rect = canvas.getBoundingClientRect();
  const clientX = event.touches ? event.touches[0].clientX : event.clientX;
  const clientY = event.touches ? event.touches[0].clientY : event.clientY;
  pontoMouse.x =  ((clientX - rect.left) / rect.width)  * 2 - 1;
  pontoMouse.y = -((clientY - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(pontoMouse, camera);
  const hits = raycaster.intersectObjects(todosMeshes());
  return hits.length > 0 ? hits[0].object.userData.pecaId : null;
}

let posInicioToque = null;
canvas.addEventListener('pointerdown', (e) => {
  posInicioToque = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('pointerup', (e) => {
  if (!posInicioToque) return;
  const dx = Math.abs(e.clientX - posInicioToque.x);
  const dy = Math.abs(e.clientY - posInicioToque.y);
  posInicioToque = null;
  if (dx < 6 && dy < 6) {
    const id = pegarPecaNoCanvas(e);
    if (id) selecionarPeca(id);
  }
});

// ── Destaque ──────────────────────────────────────────────────────────────────
function atualizarDestaque() {
  CONFIG.pecas.forEach(p => {
    const ativo = p.id === pecaSelecionada;
    meshes[p.id].forEach(m => {
      m.material.emissive.set(ativo ? CONFIG.marca.corPrimaria : '#000000');
      m.material.emissiveIntensity = ativo ? 0.18 : 0;
    });
  });
}

// ── Chips ─────────────────────────────────────────────────────────────────────
const chipsEl = document.getElementById('chips');

function selecionarPeca(id) {
  pecaSelecionada = id;
  atualizarDestaque();
  renderizarChips();
  renderizarSwatches();
}

function renderizarChips() {
  chipsEl.innerHTML = '';
  CONFIG.pecas.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (p.id === pecaSelecionada ? ' ativo' : '');
    btn.textContent = p.rotulo;
    btn.addEventListener('click', () => selecionarPeca(p.id));
    chipsEl.appendChild(btn);
  });
}

// ── Swatches ──────────────────────────────────────────────────────────────────
const swatchesEl    = document.getElementById('swatches');
const corLivreWrap  = document.getElementById('cor-livre-wrap');
const corLivreInput = document.getElementById('cor-livre');

function aplicarCor(id, hex) {
  cores[id] = hex;
  meshes[id].forEach(m => m.material.color.set(hex));
  salvarStorage();
  renderizarResumo();
  renderizarSwatches();
}

function renderizarSwatches() {
  if (!pecaSelecionada) return;
  const peca = CONFIG.pecas.find(p => p.id === pecaSelecionada);
  if (!peca) return;

  swatchesEl.innerHTML = '';
  const corAtual = cores[pecaSelecionada];

  peca.paleta.forEach(cor => {
    const btn = document.createElement('button');
    btn.className = 'swatch' + (cor.hex.toLowerCase() === corAtual.toLowerCase() ? ' ativo' : '');
    btn.style.background = cor.hex;
    btn.title = cor.nome;
    const label = document.createElement('span');
    label.className = 'swatch-label';
    label.textContent = cor.nome;
    btn.appendChild(label);
    btn.addEventListener('click', () => aplicarCor(pecaSelecionada, cor.hex));
    swatchesEl.appendChild(btn);
  });

  if (CONFIG.permitirCorLivre) {
    corLivreWrap.style.display = 'flex';
    corLivreInput.value = /^#[0-9a-f]{6}$/i.test(corAtual) ? corAtual : '#888888';
    corLivreInput.oninput = () => aplicarCor(pecaSelecionada, corLivreInput.value);
  } else {
    corLivreWrap.style.display = 'none';
  }
}

// ── Resumo ────────────────────────────────────────────────────────────────────
const resumoEl = document.getElementById('resumo');

function nomeDaCor(id) {
  const peca  = CONFIG.pecas.find(p => p.id === id);
  const hex   = cores[id];
  const match = peca?.paleta.find(c => c.hex.toLowerCase() === hex.toLowerCase());
  return match ? match.nome : `Personalizada ${hex.toUpperCase()}`;
}

function renderizarResumo() {
  resumoEl.innerHTML = '';
  CONFIG.pecas.forEach(p => {
    const linha = document.createElement('div');
    linha.className = 'resumo-linha';

    const dot = document.createElement('div');
    dot.className = 'resumo-cor-dot';
    dot.style.background = cores[p.id];

    const rotulo = document.createElement('span');
    rotulo.className = 'resumo-rotulo';
    rotulo.textContent = p.rotulo;

    const valor = document.createElement('span');
    valor.className = 'resumo-valor';
    valor.textContent = nomeDaCor(p.id);

    linha.append(dot, rotulo, valor);
    resumoEl.appendChild(linha);
  });
}

// ── localStorage ──────────────────────────────────────────────────────────────
function salvarStorage() {
  try { localStorage.setItem(CHAVE_STORAGE, JSON.stringify(cores)); } catch (_) {}
}

// ── Botão WhatsApp ────────────────────────────────────────────────────────────
document.getElementById('btn-whatsapp').addEventListener('click', () => {
  if (!CONFIG.whatsappNumber) {
    mostrarAviso('Número de WhatsApp não configurado.');
    return;
  }
  const agora = new Date();
  const data = agora.toLocaleDateString('pt-BR', { year:'numeric', month:'2-digit', day:'2-digit' })
                    .split('/').reverse().join('-');
  const hora = agora.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' }).replace(':', 'h');

  const saudacao = CONFIG.nomeVendedor ? `Olá, ${CONFIG.nomeVendedor}! ` : 'Olá! ';
  const linhas = CONFIG.pecas.map(p => {
    const hex   = cores[p.id];
    const match = p.paleta.find(c => c.hex.toLowerCase() === hex.toLowerCase());
    const nome  = match ? match.nome : `Personalizada ${hex.toUpperCase()}`;
    return `• ${p.rotulo}: ${nome} (${hex.toUpperCase()})`;
  }).join('\n');
  const unidade = quantidade === 1 ? 'unidade' : 'unidades';

  const msg = `${saudacao}Quero personalizar o produto: ${CONFIG.produto.nome}\n${linhas}\nPedido: ${data} ${hora}\n\nPreciso de ${quantidade} ${unidade}. Poderia fazer um orçamento do frete por gentileza?`;
  window.open(`https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(msg)}`, '_blank');
});

function mostrarAviso(texto) {
  const el = document.getElementById('aviso');
  el.textContent = texto;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// ── Loop de renderização ──────────────────────────────────────────────────────
function renderizar() {
  requestAnimationFrame(renderizar);
  if (autoRotando) grupoCena.rotation.y += 0.004;
  controls.update();
  renderer.render(scene, camera);
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderizarChips();
renderizarSwatches();
renderizarResumo();
carregarTodos();
</script>
</body>
</html>
